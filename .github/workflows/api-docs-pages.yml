name: API Docs (ReDoc + AsyncAPI + Pages)

on:
  push:
    branches: ["main"]
    paths:
      - "docs/openapi.json"
      - "docs/asyncapi.yaml"
      - "src/RestServer.cpp"
      - "scripts/contract_test_openapi.py"
      - "scripts/build_api_docs.sh"
      - ".github/workflows/api-docs-pages.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Contract test (OpenAPI vs routes)
        run: python3 scripts/contract_test_openapi.py

      - name: Install Redocly CLI
        run: npm install --global @redocly/cli@latest

      - name: Lint OpenAPI
        run: redocly lint docs/openapi.json

      - name: Validate AsyncAPI
        run: SUPPRESS_NO_CONFIG_WARNING=true NODE_ENV=development npx --yes @asyncapi/cli@latest validate docs/asyncapi.yaml

      - name: Build ReDoc static page
        run: |
          mkdir -p site
          redocly build-docs docs/openapi.json --output site/index.html
          cp docs/openapi.json site/openapi.json
          mkdir -p site/mqtt
          SUPPRESS_NO_CONFIG_WARNING=true NODE_ENV=development npx --yes @asyncapi/cli@latest generate fromTemplate docs/asyncapi.yaml @asyncapi/html-template --output site/mqtt --force-write --no-interactive --install --param singleFile=true
          cp docs/asyncapi.yaml site/asyncapi.yaml
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
