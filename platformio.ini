; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-s3-devkitc-1
framework = arduino
custom_release_version = 1.2.1
lib_ldf_mode = chain
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs
board_build.extra_flags = 
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
build_flags = 
	-DCORE_DEBUG_LEVEL=0
	-DASYNC_TCP_SSL_ENABLED=0
	; silence known warnings from third-party libraries
	-Wno-deprecated-declarations
lib_deps = 
	ESP32Async/ESPAsyncWebServer @ 3.10.1
	ESP32Async/AsyncTCP @ 3.4.10
	marvinroger/AsyncMqttClient @ 0.9.0
	milesburton/DallasTemperature @ 3.11.0
	bblanchon/ArduinoJson @ 7.3.0
	paulstoffregen/OneWire @ 2.3.8
	FS
	LittleFS
	SD
	SPI
	WiFi
	Ethernet
	Update
	Networking
	lib/tempnode_core
upload_speed = 921600
extra_scripts = 
	pre:scripts/pio_auto_version.py
	pre:scripts/pio_multi_target_fix.py
	pre:scripts/patch_onewire.py

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags =
	-std=gnu++17
